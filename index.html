    <title>Contoso Sample Web Chat</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f0f0f0;
      }
      #chat-container {
        display: flex;
        flex-direction: column;
        width: 429px;
        box-shadow: 0px -7px 24px rgba(0, 0, 0, 0.12);
        border-radius: 12px 12px 0px 0px;
        overflow: hidden;
      }
      #chat-header {
        height: 47px;
        background: #ffffff;
        border-bottom: 1px solid #f0f0f0;
        display: flex;
        flex-direction: row;
        align-items: center;
        padding: 0 10px;
        box-sizing: border-box;
        direction: rtl;
        gap: 10px;
      }
      #close-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      #header-content {
        flex: 1;
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 8px;
        padding-left: 34px;
      }
      #header-title {
        font-family: "Open Sans", sans-serif;
        font-weight: 700;
        font-size: 20px;
        line-height: 27px;
        color: #1d3a80;
        white-space: nowrap;
      }
      #webchat {
        width: 100%;
        height: 500px;
      }
      #chat-footer {
        width: 100%;
        background: #fafafa;
        text-align: center;
        padding: 8px 10px 10px;
        box-sizing: border-box;
        font-family: "Open Sans", sans-serif;
        direction: rtl;
      }
      #chat-footer a {
        display: block;
        color: #00667d;
        font-size: 16px;
        font-weight: 600;
        text-decoration: underline;
        margin-bottom: 4px;
      }
      #chat-footer p {
        margin: 0;
        font-size: 14px;
        color: #00667d;
      }
      #color-bar {
        width: 100%;
        height: 11px;
        display: flex;
        flex-wrap: nowrap;
      }
      /* Send box pill shape overrides */
      #webchat .webchat__send-box__main {
        border-radius: 50px !important;
        border: 1px solid #05454f !important;
        margin: 8px 16px !important;
        overflow: hidden;
        background: #ffffff !important;
        align-items: center !important;
      }
      #webchat .webchat__send-box__button {
        border-radius: 50% !important;
        width: 34px !important;
        min-width: 34px !important;
        height: 34px !important;
        margin: 0 10px !important;
        background-image: url("https://assets-eur.mkt.dynamics.com/13423f0e-c8cf-4d2f-b0b9-167e0b3fc707/digitalassets/images/4782dc2e-7854-f111-bec7-000d3adf57ee?ts=639148978629999350") !important;
        background-size: cover !important;
        background-color: transparent !important;
        align-self: center !important;
      }
      #webchat .webchat__send-box__text-box {
        align-self: center !important;
        margin: 0 !important;
        padding: 10px 25px 10px 10px !important;
      }
      #webchat .webchat__send-box-text-box__input {
        margin: 0 !important;
      }
      #webchat .webchat__send-icon {
        display: none !important;
      }

      #color-bar span {
        flex: 1;
      }
      #color-bar span:nth-child(1) {
        background: #96d600;
      }
      #color-bar span:nth-child(2) {
        background: #29d1d8;
      }
      #color-bar span:nth-child(3) {
        background: #17a1ba;
      }
      #color-bar span:nth-child(4) {
        background: #00667d;
      }
      #color-bar span:nth-child(5) {
        background: #05454f;
      }
    </style>

        userAvatarBackgroundColor: "#FFFFFFFF",
        userAvatarImage: "",
        userAvatarInitials: "",
      };

      (async function () {
        // Fetch the token using the provided endpoint
        const response = await fetch(tokenEndpoint);
        if (!response.ok) {
          throw new Error("Failed to retrieve Direct Line token.");
        }
        const { token } = await response.json();

        // Create the Direct Line instance
        const directLine = WebChat.createDirectLine({
          token,
          domain: "https://europe.directline.botframework.com/v3/directline",
        });

        // Render the Web Chat
        WebChat.renderWebChat(
          {
            locale: styleOptions.locale,
            dir: styleOptions.direction,
            directLine,
            styleOptions,
            overrideLocalizedStrings: {
              TEXT_INPUT_PLACEHOLDER: "כאן מקלידים...",
            },
          },
          document.getElementById("webchat"),
        );
      })();
